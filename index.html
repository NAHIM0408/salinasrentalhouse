<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turismo en Salinas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      text-align: center;
      background: url("https://www.baconismagic.ca/wp-content/uploads/2022/08/Humpback-Whale-Salinas-Ecuador.jpg") no-repeat center center fixed;
      background-size: cover;
      color: white;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.6);
      min-height: 100vh;
      padding: 30px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
    }

    p {
      color: #ddd;
      margin-bottom: 20px;
    }

    .contenedor {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .card {
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .bolsillo { background: linear-gradient(135deg, #0077ff, #00c6ff); }
    .avistamiento { background: linear-gradient(135deg, #00bfa6, #1de9b6); }
    .tiktok { background: #666; }
    .gastronomia { background: linear-gradient(135deg, #ff7a18, #ffb347); }
    .airbnb { background: linear-gradient(135deg, #ff385c, #ffb347); }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #ccc;
    }

    .music-msg {
      position: fixed;
      bottom: 15px;
      left: 15px;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .contenedor {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

<!-- 🎵 MÚSICA -->
<audio id="musica" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="overlay">

  <h1>🌴 Turismo en Salinas, Ecuador</h1>
  <p>Explora guías turísticas, gastronomía y experiencias únicas</p>

  <div class="contenedor">

    <a class="card bolsillo" href="https://www.salinas.gob.ec/images/salinas/Turismo/Guia%20bolsillo/guia%20de%20bolsillo%20espan%CC%83ol%20lectura.pdf" target="_blank">
      📘 Guía de Bolsillo
    </a>

    <a class="card avistamiento" href="https://www.salinas.gob.ec/index.php/guia-de-ballenas" target="_blank">
      🐋 Avistamiento
    </a>

    <a class="card tiktok" href="https://www.tiktok.com/@xavier25_/video/7456502408068304134" target="_blank">
      🎥 TikTok
    </a>

    <a class="card gastronomia" href="https://www.salinas.gob.ec/index.php/guia-gastronomica-salinas" target="_blank">
      🍽 Gastronomía
    </a>

    <a class="card airbnb" href="https://www.airbnb.com.ec/rooms/44122220?source_impression_id=p3_1777397010_P3WuXjnX4GG7GdIo" target="_blank">
      🏡 Airbnb
    </a>

  </div>

  <footer>
    Turismo digital Salinas ©
  </footer>

</div>

<div class="music-msg">
  🎵 Toca cualquier parte para activar la música
</div>

<script>
  const musica = document.getElementById("musica");

  function playMusic() {
    musica.play().catch(() => {});
  }

  // esto es lo que realmente la activa
  document.addEventListener("click", playMusic, { once: true });
  document.addEventListener("touchstart", playMusic, { once: true });

</script>

</body>
</html>
